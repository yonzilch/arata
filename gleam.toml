name = "arata"
version = "0.1.0"
target = "javascript"

description = "A faithful reimplementation of the apollo blog theme, built with Gleam and the Lustre framework."
licences = ["MIT"]
repository = { type = "github", user = "yonzilch", repo = "arata" }
links = [{ title = "Homepage", href = "https://github.com/yonzilch/arata" }]

# The Lustre HTML tool generates the dev/build `index.html` and bundles the
# compiled JavaScript entry module. See https://hexdocs.pm/lustre/.
[tools.lustre.html]
title = "arata"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.7.0 and < 6.0.0"
modem = ">= 2.1.3 and < 3.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
mork = ">= 1.12.1 and < 2.0.0"
mork_to_lustre = ">= 1.0.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.6 and < 3.0.0"
