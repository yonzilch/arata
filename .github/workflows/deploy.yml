name: deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest

    outputs:
      should_run: ${{ steps.decision.outputs.should_run }}
      is_deploy_ref: ${{ steps.decision.outputs.is_deploy_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether this workflow should run
        id: decision
        shell: bash
        run: |
          set -eu

          should_run=true
          is_deploy_ref=false

          find_v_tags_for_sha() {
            git fetch --force --tags origin '+refs/tags/*:refs/tags/*'

            git for-each-ref \
              --format='%(refname:short) %(objectname) %(*objectname)' \
              'refs/tags/v*' |
              awk -v sha="${GITHUB_SHA}" '
                $2 == sha || $3 == sha {
                  print $1
                }
              '
          }

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            should_run=true
            is_deploy_ref=false

          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            should_run=true
            is_deploy_ref=true

          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            case "${GITHUB_REF_NAME}" in
              main|master)
                is_deploy_ref=true
                ;;
              *)
                is_deploy_ref=false
                ;;
            esac

            if [ "${is_deploy_ref}" = "true" ]; then
              # When pushing a branch and a tag at nearly the same time, the
              # branch workflow may start before the tag ref is visible.
              # Give the remote ref advertisement a short chance to settle so
              # the tag workflow can own deploys for tagged commits.
              sleep 10

              tags_for_sha="$(find_v_tags_for_sha || true)"

              if [ -n "${tags_for_sha}" ]; then
                echo "Current branch commit ${GITHUB_SHA} already has v* tag(s):"
                echo "${tags_for_sha}"
                echo "Skipping branch run so the tag run owns this commit."
                should_run=false
                is_deploy_ref=false
              fi
            fi
          fi

          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "is_deploy_ref=${is_deploy_ref}" >> "${GITHUB_OUTPUT}"

  build:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: gleam deps download

      - name: Run tests
        run: gleam test

      - name: Build site
        run: gleam run -m build/pipeline

      - name: Upload Pages artifact
        if: needs.preflight.outputs.is_deploy_ref == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs:
      - preflight
      - build
    if: always() && needs.preflight.outputs.should_run == 'true' && needs.preflight.outputs.is_deploy_ref == 'true' && needs.build.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
