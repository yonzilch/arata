name: deploy

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pages-pr-{0}', github.event.pull_request.number) || 'pages-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.14.0"
          rebar3-version: "3"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: gleam deps download

      - name: Run tests
        run: gleam test

      - name: Build site
        run: gleam run -m build/pipeline

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  check-deployment:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    outputs:
      already_deployed: ${{ steps.check.outputs.already_deployed }}
    steps:
      - name: Check if this commit is already deployed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          sha="${GITHUB_SHA}"
          repo="${GITHUB_REPOSITORY}"

          echo "Looking up github-pages deployments for ${sha}..."
          deployment_ids=$(gh api \
            "repos/${repo}/deployments?sha=${sha}&environment=github-pages&per_page=100" \
            --jq '.[].id' 2>/dev/null || true)

          already_deployed=false
          for id in ${deployment_ids}; do
            state=$(gh api \
              "repos/${repo}/deployments/${id}/statuses?per_page=100" \
              --jq '.[-1].state // empty' 2>/dev/null || true)
            echo "deployment ${id} latest state: ${state}"
            if [ "${state}" = "success" ]; then
              already_deployed=true
              break
            fi
          done

          echo "already_deployed=${already_deployed}" >> "${GITHUB_OUTPUT}"

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - check-deployment
    if: >
      github.event_name == 'push' &&
      needs.check-deployment.outputs.already_deployed != 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
